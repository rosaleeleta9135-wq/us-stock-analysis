name: 美股盘前盘后自动分析

on:
  schedule:
    - cron: '30 12 * * 1-5'
    - cron: '10 20 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Generate pre-market report
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python generate_report.py --mode pre 2>&1 || echo "Pre-market report generation failed"
      
      - name: Generate post-market report
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python generate_report.py --mode post 2>&1 || echo "Post-market report generation failed"
      
      - name: Commit and push reports
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add reports/ || true
          git commit -m "auto: $(date +%Y-%m-%d) 美股分析报告" || echo "No changes to commit"
          git push origin main || echo "Push failed"
        continue-on-error: true
