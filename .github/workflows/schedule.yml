name: 美股盘前盘后自动分析

on:
  schedule:
    # 盘前分析：美东时间 08:30（UTC 12:30）
    - cron: '30 12 * * 1-5'
    # 盘后分析：美东时间 16:10（UTC 20:10）
    - cron: '10 20 * * 1-5'
  workflow_dispatch:

jobs:
  daily-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: ✍️ 生成盘前分析报告
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          mkdir -p reports
          python generate_report.py --mode pre
        continue-on-error: true
      
      - name: ✍️ 生成盘后展望报告
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          mkdir -p reports
          python generate_report.py --mode post
        continue-on-error: true
      
      - name: 📤 提交报告到仓库
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add reports/ || true
          git commit -m "auto: $(date +%Y-%m-%d) 美股分析报告" || echo "无新文件"
          git push || echo "推送失败"
        continue-on-error: true
